# Tagged release — cut a proper (non-prerelease) release from a vX.Y tag.
# These DO notify watchers (unlike the rolling nightly). Push a tag to fire:
#   git tag v0.1 && git push origin v0.1

name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build — port + resource explorer + voice patch
        run: |
          nix develop .#ci --command make -C src
          nix develop .#ci --command make -C tools/voice_view
          nix develop .#ci --command make -C tools/ennse_voice

      - name: Gate — no embedded game assets
        run: nix develop .#ci --command python3 tools/ci/no_proprietary_bytes.py
             build/opensummoners.exe build/voice_view.exe build/version.dll

      - name: Package — voice patch zip
        run: nix develop .#ci --command bash tools/ci/package_patch.sh

      - name: Compose release notes
        run: |
          {
            echo "OpenSummoners ${GITHUB_REF_NAME} — unsigned, **bring your own game**."
            echo
            echo "Ships **no game assets**; everything reads your own files at runtime."
            echo "- **opensummoners.exe** — the port."
            echo "- **voice_view.exe** — the resource explorer."
            echo "- **ennse-voice-patch.zip** — EN-SE Japanese-voice patch (run Install.bat;"
            echo "  needs \`sotesx_s.dll\` from your own JP copy)."
            echo
            echo "See the README for install details."
          } > release-notes.md

      # Publish via the pre-installed GitHub CLI (robust, no third-party action).
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          retry() { local n; for n in 1 2 3; do "$@" && return 0; echo "  (attempt $n failed — retry in 10s)"; sleep 10; done; return 1; }
          files="build/opensummoners.exe build/voice_view.exe build/ennse-voice-patch.zip"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            retry gh release upload "$GITHUB_REF_NAME" --clobber $files
          else
            retry gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md $files
          fi
